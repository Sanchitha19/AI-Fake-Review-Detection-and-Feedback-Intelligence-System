version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: review_guard_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./models:/app/models # persist trained models
      - ./mlruns:/app/mlruns # persist MLflow experiment logs
      - ./reviews.csv:/app/reviews.csv # mount training data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Streamlit frontend ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: review_guard_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000 # inter-container networking
    depends_on:
      api:
        condition: service_healthy

  # ── MLflow tracking server (optional, comment out if not needed) ──────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: review_guard_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns

volumes:
  models:
  mlruns:
